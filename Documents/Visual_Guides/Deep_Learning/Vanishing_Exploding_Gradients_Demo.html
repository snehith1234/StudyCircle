<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vanishing & Exploding Gradients — Animated with Full Math</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0e1117;color:#e2e8f0;font-family:'Segoe UI',system-ui,sans-serif;display:flex;flex-direction:column;align-items:center;padding:16px;min-height:100vh}
h1{font-size:1.3rem;color:#fff;margin-bottom:3px}
.sub{color:#8892b0;font-size:.82rem;margin-bottom:10px;text-align:center}
.tabs{display:flex;gap:8px;margin-bottom:10px}
.tab{padding:8px 18px;border-radius:7px;cursor:pointer;font-size:.85rem;border:1px solid #3d4260;background:#252840;color:#e2e8f0;transition:.2s}
.tab:hover{border-color:#5eaeff}
.tab.av{background:#1a2a3c;border-color:#5eaeff;color:#5eaeff}
.tab.ae{background:#3a1a1f;border-color:#f45d6d;color:#f45d6d}
.tab.af{background:#1a2a1f;border-color:#22d3a7;color:#22d3a7}
canvas{border-radius:10px;background:#131620}
.ctrls{display:flex;gap:8px;margin:10px 0;align-items:center;flex-wrap:wrap;justify-content:center}
button{background:#252840;border:1px solid #3d4260;color:#e2e8f0;padding:7px 15px;border-radius:7px;cursor:pointer;font-size:.85rem;transition:.2s}
button:hover{background:#3d4260;border-color:#5eaeff}
button.on{background:#1a3a5c;border-color:#5eaeff;color:#5eaeff}
#sc{color:#8892b0;font-size:.82rem;min-width:120px;text-align:center}
.sr{display:flex;align-items:center;gap:8px}
.sr label{color:#8892b0;font-size:.82rem}
.sr input[type=range]{width:150px;accent-color:#5eaeff}
.panel{background:#1a1d2e;border:1px solid #2d3148;border-radius:10px;padding:14px 18px;max-width:950px;width:100%;margin-top:8px;font-size:.82rem;line-height:1.6;overflow-x:auto}
table{border-collapse:collapse;width:100%;margin:8px 0;font-size:.8rem;font-family:'Courier New',monospace}
th,td{padding:5px 8px;border:1px solid #2d3148;text-align:center}
th{background:#252840;color:#8892b0}
.gv{color:#22d3a7}.bv{color:#f45d6d}.yv{color:#f5b731}
h3{margin-bottom:6px}
</style>
</head>
<body>
<h1>Vanishing & Exploding Gradients — Full Math Breakdown</h1>
<p class="sub">See the exact multiplication chain that causes gradients to shrink or blow up</p>
<div class="tabs">
<div class="tab av" id="tV" onclick="setM('v')">💀 Vanishing (Sigmoid)</div>
<div class="tab" id="tE" onclick="setM('e')">💥 Exploding (Large W)</div>
<div class="tab" id="tF" onclick="setM('f')">✅ Fixed (ReLU)</div>
</div>
<canvas id="cv" width="950" height="340"></canvas>
<div class="ctrls">
<button id="bp" onclick="togPlay()">▶ Play</button>
<button onclick="stp()">⏭ Step</button>
<button onclick="rst()">↺ Reset</button>
<span id="sc">Ready</span>
<button onclick="spd=1000">Slow</button>
<button onclick="spd=500" class="on">Med</button>
<button onclick="spd=250">Fast</button>
<div class="sr">
<label>Layers: <span id="lv">6</span></label>
<input type="range" id="ls" min="3" max="10" value="6" oninput="osl()">
</div>
</div>
<div class="panel" id="pn"></div>
<script>
const cv=document.getElementById('cv'),C=cv.getContext('2d'),pn=document.getElementById('pn'),sc=document.getElementById('sc');
let mode='v',nL=6,cur=0,playing=false,tmr=null,spd=500;

function sig(z){return 1/(1+Math.exp(-z));}
function relu(z){return Math.max(0.01,z);} // leaky to avoid dead

function buildNet(){
  const ws=[],acts=[0.7],zs=[0.7],sds=[],bs=[];
  for(let l=0;l<nL-1;l++){
    let w;
    if(mode==='v')w=0.5; else if(mode==='e')w=2.5; else w=1.0;
    ws.push(w); bs.push(0.1);
    let z=acts[l]*w+0.1;
    let a,sd;
    if(mode==='f'){a=relu(z);sd=a>0?1:0.01;} else{a=sig(z);sd=a*(1-a);}
    zs.push(z);acts.push(a);sds.push(sd);
  }
  let g=1.0;
  const grads=[],chain=[];
  grads[nL-1]=1.0;
  for(let l=nL-2;l>=0;l--){
    const factor=sds[l]*ws[l];
    g=g*factor;
    grads[l]=g;
    chain.unshift({layer:l,sd:sds[l],w:ws[l],factor:factor,grad:g});
  }
  return{ws,acts,zs,sds,grads,chain};
}

// Steps: 0=init, 1..nL-1=forward, nL..2nL-2=backward, 2nL-1=summary
function totS(){return 2*nL;}
function phOf(s){if(s===0)return'init';if(s<nL)return'fwd';if(s<2*nL-1)return'bwd';return'done';}

function nX(i){return 60+i*((cv.width-120)/(nL-1));}
const NY=160;

function draw(){
  const W=cv.width,H=cv.height;C.clearRect(0,0,W,H);
  const net=buildNet();
  const ph=phOf(cur);
  const fwdL=ph==='fwd'?cur:ph==='init'?0:nL;
  const bwdIdx=ph==='bwd'?cur-nL:ph==='done'?nL-1:-1;
  const bwdL=bwdIdx>=0?nL-1-bwdIdx:nL;
  const col=mode==='v'?'#5eaeff':mode==='e'?'#f45d6d':'#22d3a7';
  const maxG=Math.max(...net.grads.map(Math.abs),0.001);

  // Connections
  for(let l=0;l<nL-1;l++){
    const x1=nX(l),x2=nX(l+1);
    const fwdAct=ph==='fwd'&&cur===l+1;
    const bwdAct=ph==='bwd'&&(nL-1-bwdIdx)===l;
    const bwdDone=l>=bwdL&&ph!=='init'&&ph!=='fwd';
    const fwdDone=fwdL>l+1||(ph!=='init'&&ph!=='fwd');

    C.beginPath();C.moveTo(x1+18,NY);C.lineTo(x2-18,NY);
    if(fwdAct){C.strokeStyle='#5eaeff';C.lineWidth=3;C.globalAlpha=1;}
    else if(bwdAct){
      const gM=Math.abs(net.grads[l]);
      C.strokeStyle='#f45d6d';C.lineWidth=Math.min(Math.max(gM/maxG*10,1.5),14);C.globalAlpha=Math.min(Math.max(gM/maxG,0.2),1);
    } else if(bwdDone){
      const gM=Math.abs(net.grads[l]);
      C.strokeStyle='#f45d6d';C.lineWidth=Math.min(Math.max(gM/maxG*8,1),12);C.globalAlpha=Math.min(Math.max(gM/maxG,0.15),0.7);
    } else if(fwdDone){C.strokeStyle=col;C.lineWidth=1.5;C.globalAlpha=0.4;}
    else{C.strokeStyle='#2d3148';C.lineWidth=1;C.globalAlpha=0.3;}
    C.stroke();C.globalAlpha=1;

    // Weight
    C.font='9px Courier New';C.fillStyle='#8892b0';C.textAlign='center';
    C.fillText('w='+net.ws[l].toFixed(1),(x1+x2)/2,NY-20);

    // sig' or relu' between nodes
    if(fwdDone||bwdDone){
      C.font='9px Courier New';C.fillStyle='#f5b731';
      const lbl=mode==='f'?"relu'="+net.sds[l].toFixed(1):"sig'="+net.sds[l].toFixed(3);
      C.fillText(lbl,(x1+x2)/2,NY+18);
    }

    // Factor = sig' * w (the multiplier at this layer)
    if(bwdDone||bwdAct){
      C.font='bold 9px Courier New';
      const f=net.sds[l]*net.ws[l];
      C.fillStyle=Math.abs(f)<1?'#f45d6d':Math.abs(f)>1?'#f45d6d':'#22d3a7';
      C.fillText('factor='+f.toFixed(3),(x1+x2)/2,NY+32);
    }

    // Animated dot
    if(fwdAct||bwdAct){
      const t=(Date.now()%600)/600,pr=bwdAct?1-t:t;
      const dx=x2-18-(x1+18);
      C.beginPath();C.arc(x1+18+dx*pr,NY,5,0,Math.PI*2);
      C.fillStyle=bwdAct?'#f45d6d':'#5eaeff';C.fill();
    }
  }

  // Neurons
  for(let l=0;l<nL;l++){
    const x=nX(l);
    const showVal=fwdL>=l;
    const showGrad=l>=bwdL&&(ph==='bwd'||ph==='done');
    const isActF=ph==='fwd'&&cur===l;
    const isActB=ph==='bwd'&&l===bwdL;

    if(isActF||isActB){
      const grd=C.createRadialGradient(x,NY,8,x,NY,32);
      grd.addColorStop(0,isActB?'rgba(244,93,109,0.35)':'rgba(94,174,255,0.35)');
      grd.addColorStop(1,'rgba(0,0,0,0)');
      C.beginPath();C.arc(x,NY,32,0,Math.PI*2);C.fillStyle=grd;C.fill();
    }

    C.beginPath();C.arc(x,NY,18,0,Math.PI*2);C.fillStyle='#1a1d2e';
    C.strokeStyle=isActF?'#5eaeff':isActB?'#f45d6d':showGrad?'#f45d6d':'#3d4260';
    C.lineWidth=isActF||isActB?2.5:1.5;C.fill();C.stroke();

    C.font='10px Courier New';C.fillStyle='#e2e8f0';C.textAlign='center';C.textBaseline='middle';
    if(showVal)C.fillText(net.acts[l].toFixed(2),x,NY);
    else{C.fillStyle='#555';C.fillText('?',x,NY);}

    C.font='10px Segoe UI';C.fillStyle='#8892b0';C.textBaseline='top';
    C.fillText(l===0?'Input':l===nL-1?'Output':'L'+l,x,NY+24);

    if(showGrad){
      const gv=Math.abs(net.grads[l]);
      C.font='10px Courier New';
      C.fillStyle=gv<0.01?'#f45d6d':gv>100?'#f45d6d':'#22d3a7';
      C.fillText(gv<0.0001?gv.toExponential(1):gv>999?gv.toExponential(1):gv.toFixed(4),x,NY+42);
    }
  }

  // Bar chart
  const barY=230,barH=70,barW=Math.min(((cv.width-120)/(nL-1))*0.45,35);
  C.font='9px Segoe UI';C.fillStyle='#8892b0';C.textAlign='center';C.textBaseline='top';
  C.fillText('Gradient Magnitude (log scale)',cv.width/2,barY-12);
  for(let l=0;l<nL;l++){
    const x=nX(l);
    const showG=l>=bwdL&&(ph==='bwd'||ph==='done');
    const gv=showG?Math.abs(net.grads[l]):0;
    const logG=Math.log10(Math.max(gv,1e-20));
    const scaled=Math.min(Math.max((logG+10)/15,0),1)*barH;
    if(showG&&gv>0){
      C.fillStyle=mode==='v'?'rgba(94,174,255,0.6)':mode==='e'?'rgba(244,93,109,0.6)':'rgba(34,211,167,0.6)';
      C.fillRect(x-barW/2,barY+barH-scaled,barW,scaled);
    }
    C.strokeStyle='#2d3148';C.lineWidth=1;C.strokeRect(x-barW/2,barY,barW,barH);
  }
  const ref1=Math.min(Math.max((0+10)/15,0),1)*barH;
  C.beginPath();C.moveTo(30,barY+barH-ref1);C.lineTo(cv.width-30,barY+barH-ref1);
  C.strokeStyle='#f5b731';C.lineWidth=1;C.setLineDash([4,4]);C.stroke();C.setLineDash([]);
  C.font='8px Segoe UI';C.fillStyle='#f5b731';C.textAlign='left';
  C.fillText('grad=1',32,barY+barH-ref1-9);

  // Phase
  C.font='bold 12px Segoe UI';C.textAlign='left';C.textBaseline='top';
  if(ph==='init'){C.fillStyle='#f5b731';C.fillText('⚙ INIT — weights & activations',8,8);}
  else if(ph==='fwd'){C.fillStyle='#5eaeff';C.fillText('→ FORWARD (layer '+cur+')',8,8);}
  else if(ph==='bwd'){C.fillStyle='#f45d6d';C.fillText('← BACKWARD — gradient at layer '+bwdL,8,8);}
  else{C.fillStyle='#22d3a7';C.fillText('✓ COMPLETE',8,8);}

  updPanel(net,ph,bwdL,bwdIdx);
}

function fmt(v){return Math.abs(v)<0.0001?v.toExponential(2):Math.abs(v)>999?v.toExponential(2):v.toFixed(4);}

function updPanel(net,ph,bwdL,bwdIdx){
  let h='';
  if(ph==='init'){
    h='<h3 style="color:#f5b731">Initialization</h3>';
    h+='<p>Input activation = 0.70. Each layer has weight = '+net.ws[0].toFixed(1)+'. Activation: '+(mode==='f'?'ReLU':'Sigmoid')+'.</p>';
    h+='<p>Press Play to watch forward pass, then backward pass with the multiplication chain.</p>';
  } else if(ph==='fwd'){
    h='<h3 style="color:#5eaeff">Forward Pass</h3>';
    h+='<p>Computing activations left to right: <span style="color:#22d3a7">z = w * a_prev + b</span>, then <span style="color:#22d3a7">a = '+(mode==='f'?'ReLU(z)':'sigmoid(z)')+'</span></p>';
    h+='<p>Activations: '+net.acts.slice(0,cur+1).map(a=>a.toFixed(3)).join(' → ')+'</p>';
  } else if(ph==='bwd'){
    h='<h3 style="color:#f45d6d">Backward Pass — The Multiplication Chain</h3>';
    h+='<p>Gradient at output = 1.0. At each layer going left, we multiply by: <span style="color:#f5b731">factor = activation_derivative × weight</span></p>';
    h+='<p>The gradient at layer L = 1.0 × factor₁ × factor₂ × ... × factorₗ</p>';

    // Build the computation table
    h+='<table><tr><th>Layer</th><th>Activation</th><th>'+(mode==='f'?"ReLU'":"sig'(a)")+'</th><th>Weight</th><th>Factor = '+(mode==='f'?"relu'":"sig'")+" × w</th><th>Cumulative Gradient</th><th>Computation</th></tr>";

    h+='<tr><td>Output</td><td>'+net.acts[nL-1].toFixed(3)+'</td><td>—</td><td>—</td><td>—</td><td class="gv">1.0000</td><td>Starting gradient</td></tr>';

    let cumStr='1.0';
    const visibleLayers=Math.min(bwdIdx+1, nL-1);
    for(let i=0;i<visibleLayers;i++){
      const ci=net.chain[nL-2-i]; // chain is stored left-to-right, we go right-to-left
      const sd=ci.sd, w=ci.w, f=ci.factor, g=ci.grad;
      const sdStr=mode==='f'?sd.toFixed(1):sd.toFixed(3);
      const fStr=f.toFixed(4);
      cumStr+=' × '+fStr;
      const gClass=Math.abs(g)<0.01?'bv':Math.abs(g)>100?'bv':'gv';
      const arrow=Math.abs(f)<1?'↓ shrinking':Math.abs(f)>1?'↑ growing':'= stable';
      h+='<tr><td>L'+(ci.layer+1)+'→L'+ci.layer+'</td>';
      h+='<td>'+net.acts[ci.layer+1].toFixed(3)+'</td>';
      h+='<td>'+sdStr+'</td>';
      h+='<td>'+w.toFixed(1)+'</td>';
      h+='<td class="yv">'+fStr+' ('+arrow+')</td>';
      h+='<td class="'+gClass+'">'+fmt(g)+'</td>';
      h+='<td style="font-size:.75rem;color:#8892b0">'+cumStr+'</td></tr>';
    }
    h+='</table>';

    if(visibleLayers>0){
      const lastF=net.chain[nL-2].factor;
      if(Math.abs(lastF)<1){
        h+='<p class="bv">Each factor is '+Math.abs(lastF).toFixed(3)+' (less than 1). Multiplying '+(nL-1)+' times: '+Math.abs(lastF).toFixed(3)+'<sup>'+(nL-1)+'</sup> = '+Math.pow(Math.abs(lastF),nL-1).toExponential(2)+' — gradient vanishes!</p>';
      } else if(Math.abs(lastF)>1){
        h+='<p class="bv">Each factor is '+Math.abs(lastF).toFixed(3)+' (greater than 1). Multiplying '+(nL-1)+' times: '+Math.abs(lastF).toFixed(3)+'<sup>'+(nL-1)+'</sup> = '+Math.pow(Math.abs(lastF),nL-1).toExponential(2)+' — gradient explodes!</p>';
      } else {
        h+='<p class="gv">Each factor ≈ 1. Gradient stays stable across all layers.</p>';
      }
    }
  } else {
    const g0=Math.abs(net.grads[0]),gN=Math.abs(net.grads[nL-1]),ratio=g0/gN;
    h='<h3 style="color:#22d3a7">Complete — Final Result</h3>';
    h+='<p>Output gradient: <span class="gv">'+fmt(gN)+'</span> | First layer gradient: <span class="'+(g0<0.01||g0>100?'bv':'gv')+'">'+fmt(g0)+'</span></p>';
    h+='<p>Ratio (first/last): <span class="'+(ratio<0.1||ratio>10?'bv':'gv')+'">'+ratio.toExponential(2)+'</span></p>';

    // Full chain summary
    h+='<table><tr><th>Layer</th><th>'+(mode==='f'?"relu'":"sig'")+'</th><th>w</th><th>Factor</th><th>Cumulative Grad</th></tr>';
    h+='<tr><td>Output</td><td>—</td><td>—</td><td>—</td><td class="gv">1.0000</td></tr>';
    for(let i=nL-2;i>=0;i--){
      const ci=net.chain[i];
      const gClass=Math.abs(ci.grad)<0.01?'bv':Math.abs(ci.grad)>100?'bv':'gv';
      h+='<tr><td>L'+ci.layer+'</td><td>'+(mode==='f'?ci.sd.toFixed(1):ci.sd.toFixed(3))+'</td><td>'+ci.w.toFixed(1)+'</td><td class="yv">'+ci.factor.toFixed(4)+'</td><td class="'+gClass+'">'+fmt(ci.grad)+'</td></tr>';
    }
    h+='</table>';

    if(mode==='v') h+='<p class="yv">Fix: Use ReLU (derivative=1), batch normalization, residual connections, or LSTM.</p>';
    else if(mode==='e') h+='<p class="yv">Fix: Gradient clipping, proper initialization (Xavier/He), batch normalization.</p>';
    else h+='<p class="yv">ReLU + proper init keeps gradients stable. This is the modern default.</p>';
  }
  pn.innerHTML=h;
  sc.textContent='Step '+cur+'/'+( totS()-1);
}

function setM(m){mode=m;document.querySelectorAll('.tab').forEach(t=>t.className='tab');
  if(m==='v')document.getElementById('tV').className='tab av';
  else if(m==='e')document.getElementById('tE').className='tab ae';
  else document.getElementById('tF').className='tab af';rst();}
function osl(){nL=parseInt(document.getElementById('ls').value);document.getElementById('lv').textContent=nL;rst();}
function stp(){if(cur<totS()-1)cur++;draw();}
function togPlay(){playing=!playing;document.getElementById('bp').textContent=playing?'⏸ Pause':'▶ Play';
  document.getElementById('bp').classList.toggle('on',playing);
  if(playing)tmr=setInterval(()=>{if(cur>=totS()-1){togPlay();return;}stp();},spd);else clearInterval(tmr);}
function rst(){if(playing)togPlay();cur=0;draw();}
function anim(){draw();requestAnimationFrame(anim);}
draw();anim();
</script>
</body>
</html>
