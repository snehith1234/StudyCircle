<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neural Network Training — 2 Hidden Layers</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0e1117;color:#e2e8f0;font-family:'Segoe UI',system-ui,sans-serif;display:flex;flex-direction:column;align-items:center;padding:14px;min-height:100vh}
h1{font-size:1.25rem;color:#fff;margin-bottom:2px}
.sub{color:#8892b0;font-size:.8rem;margin-bottom:8px;text-align:center}
canvas{border-radius:10px;background:#131620}
.ctrls{display:flex;gap:7px;margin:8px 0;align-items:center;flex-wrap:wrap;justify-content:center}
button{background:#252840;border:1px solid #3d4260;color:#e2e8f0;padding:6px 14px;border-radius:7px;cursor:pointer;font-size:.83rem;transition:.2s}
button:hover{background:#3d4260;border-color:#5eaeff}
button.on{background:#1a3a5c;border-color:#5eaeff;color:#5eaeff}
.panel{background:#1a1d2e;border:1px solid #2d3148;border-radius:10px;padding:12px 16px;max-width:960px;width:100%;margin-top:6px;font-size:.8rem;line-height:1.55}
.panel h3{margin-bottom:4px}
.m{color:#22d3a7;font-family:'Courier New',monospace}
.w{color:#f45d6d}.y{color:#f5b731}
#sc{color:#8892b0;font-size:.8rem;min-width:130px;text-align:center}
</style>
</head>
<body>
<h1>🧠 Neural Network Training — Watch It Learn</h1>
<p class="sub">2 inputs → 3 hidden → 2 hidden → 1 output | 3 epochs with bias nodes</p>
<canvas id="cv" width="960" height="520"></canvas>
<div class="ctrls">
<button id="bp" onclick="togPlay()">▶ Play</button>
<button onclick="stp()">⏭ Step</button>
<button onclick="rst()">↺ Reset</button>
<span id="sc">Epoch 1</span>
<button onclick="spd=1100">Slow</button>
<button onclick="spd=550" class="on">Med</button>
<button onclick="spd=280">Fast</button>
</div>
<div class="panel" id="pn"></div>
<script>
const cv=document.getElementById('cv'),C=cv.getContext('2d'),pn=document.getElementById('pn'),sc=document.getElementById('sc');
let cur=0,playing=false,tmr=null,spd=550;
const LR=0.5,EP=3,INP=[0.8,0.6],YT=1.0;

// Architecture: 2-3-2-1
// Weights
let W1,B1,W2,B2,W3,B3;
function initW(){
  W1=[[.3,-.5,.8],[.4,.2,-.6]]; B1=[.1,-.1,.2];
  W2=[[.5,-.3],[-.4,.7],[.2,.1]]; B2=[.1,-.2];
  W3=[[.6],[-.5]]; B3=[.1];
}
initW();
function sig(z){return 1/(1+Math.exp(-z));}

const hist=[];
function epoch(){
  // Forward
  const z1=[],a1=[];
  for(let j=0;j<3;j++){let s=B1[j];for(let i=0;i<2;i++)s+=W1[i][j]*INP[i];z1[j]=s;a1[j]=sig(s);}
  const z2=[],a2=[];
  for(let j=0;j<2;j++){let s=B2[j];for(let i=0;i<3;i++)s+=W2[i][j]*a1[i];z2[j]=s;a2[j]=sig(s);}
  let z3=B3[0];for(let i=0;i<2;i++)z3+=W3[i][0]*a2[i];
  const a3=sig(z3),loss=-(YT*Math.log(a3+1e-15)+(1-YT)*Math.log(1-a3+1e-15));

  // Backward
  const dLda3=-YT/(a3+1e-15)+(1-YT)/(1-a3+1e-15);
  const d3=dLda3*a3*(1-a3);
  const d2=[];for(let j=0;j<2;j++)d2[j]=d3*W3[j][0]*a2[j]*(1-a2[j]);
  const d1=[];for(let j=0;j<3;j++){let s=0;for(let k=0;k<2;k++)s+=d2[k]*W2[j][k];d1[j]=s*a1[j]*(1-a1[j]);}

  const snap={
    a1:[...a1],a2:[...a2],a3,z1:[...z1],z2:[...z2],z3,loss,d3,d2:[...d2],d1:[...d1],
    W1b:W1.map(r=>[...r]),B1b:[...B1],W2b:W2.map(r=>[...r]),B2b:[...B2],W3b:W3.map(r=>[...r]),B3b:[...B3]
  };

  // Update
  for(let i=0;i<2;i++)for(let j=0;j<3;j++)W1[i][j]-=LR*d1[j]*INP[i];
  for(let j=0;j<3;j++)B1[j]-=LR*d1[j];
  for(let i=0;i<3;i++)for(let j=0;j<2;j++)W2[i][j]-=LR*d2[j]*a1[i];
  for(let j=0;j<2;j++)B2[j]-=LR*d2[j];
  for(let i=0;i<2;i++)W3[i][0]-=LR*d3*a2[i];
  B3[0]-=LR*d3;

  snap.W1a=W1.map(r=>[...r]);snap.B1a=[...B1];
  snap.W2a=W2.map(r=>[...r]);snap.B2a=[...B2];
  snap.W3a=W3.map(r=>[...r]);snap.B3a=[...B3];
  return snap;
}
function build(){initW();hist.length=0;for(let i=0;i<EP;i++)hist.push(epoch());}
build();

// Steps per epoch: 0=init,1=fwd_h1,2=fwd_h2,3=fwd_out,4=loss,5=bwd_out,6=bwd_h2,7=bwd_h1,8=update,9=compare
const SPE=10,TOT=EP*SPE;
function epOf(s){return Math.floor(s/SPE);}
function ss(s){return s%SPE;}
function ph(s){const p=s%SPE;if(p===0)return'init';if(p<=4)return'fwd';if(p<=8)return'bwd';return'cmp';}

// Layout
const LY=[{n:2,x:100,l:'Input'},{n:3,x:320,l:'Hidden 1'},{n:2,x:540,l:'Hidden 2'},{n:1,x:760,l:'Output'}];
function nY(li,ni){const t=(LY[li].n-1)*80;return 270-t/2+ni*80;}
const BY=80;

function getW(snap,l,i,j,after){
  if(l===0)return after?snap.W1a[i][j]:snap.W1b[i][j];
  if(l===1)return after?snap.W2a[i][j]:snap.W2b[i][j];
  if(l===2)return after?snap.W3a[i][j]:snap.W3b[i][j];
}
function getB(snap,l,j,after){
  if(l===0)return after?snap.B1a[j]:snap.B1b[j];
  if(l===1)return after?snap.B2a[j]:snap.B2b[j];
  if(l===2)return after?snap.B3a[j]:snap.B3b[j];
}

function draw(){
  const W=cv.width,H=cv.height;C.clearRect(0,0,W,H);
  const ep=epOf(cur),s=ss(cur),p=ph(cur);
  const e=hist[Math.min(ep,EP-1)];
  const isFwd=p==='fwd',isBwd=p==='bwd';
  const useAfter=s===9;

  // Bias nodes + connections
  for(let l=1;l<4;l++){
    const bx=LY[l].x;
    // Bias node
    C.beginPath();C.arc(bx,BY,12,0,Math.PI*2);
    C.fillStyle='#1e1a2e';C.strokeStyle='#a78bfa';C.lineWidth=1.5;C.fill();C.stroke();
    C.font='bold 10px Courier New';C.fillStyle='#a78bfa';C.textAlign='center';C.textBaseline='middle';
    C.fillText('1',bx,BY);
    C.font='8px Segoe UI';C.fillStyle='#8892b0';C.textBaseline='top';C.fillText('bias',bx,BY-24);
    // Bias connections
    for(let j=0;j<LY[l].n;j++){
      const ty=nY(l,j);
      C.beginPath();C.moveTo(bx,BY+12);C.lineTo(bx,ty-18);
      C.setLineDash([3,3]);C.strokeStyle='#a78bfa';C.lineWidth=1;C.globalAlpha=0.4;C.stroke();
      C.setLineDash([]);C.globalAlpha=1;
      const bv=getB(e,l-1,j,useAfter);
      C.font='8px Courier New';C.fillStyle='#a78bfa';C.textAlign='right';
      C.fillText(bv.toFixed(2),bx-14,(BY+12+ty-18)/2);
    }
  }

  // Weight connections
  for(let l=0;l<3;l++){
    for(let i=0;i<LY[l].n;i++){
      for(let j=0;j<LY[l+1].n;j++){
        const x1=LY[l].x,y1=nY(l,i),x2=LY[l+1].x,y2=nY(l+1,j);
        const fAct=(isFwd&&s===l+1);
        const bAct=(isBwd&&s===(8-l)); // 5=out,6=h2,7=h1
        C.beginPath();C.moveTo(x1+18,y1);C.lineTo(x2-18,y2);
        if(fAct){C.strokeStyle='#5eaeff';C.lineWidth=2;C.globalAlpha=0.85;}
        else if(bAct){C.strokeStyle='#f45d6d';C.lineWidth=2;C.globalAlpha=0.85;}
        else if(s>=8){C.strokeStyle='#22d3a7';C.lineWidth=1.5;C.globalAlpha=0.5;}
        else{C.strokeStyle='#2d3148';C.lineWidth=1;C.globalAlpha=0.3;}
        C.stroke();C.globalAlpha=1;

        // Weight label
        const mx=(x1+18+x2-18)/2,my=(y1+y2)/2;
        const wv=getW(e,l,i,j,useAfter);
        C.font='8px Courier New';C.fillStyle=wv>=0?'#22d3a7':'#f45d6d';C.textAlign='center';
        const off=((i*7+j*5)%15)-7;
        C.fillText(wv.toFixed(2),mx,my+off);

        // Animated dot
        if(fAct||bAct){
          const t=(Date.now()%600)/600,pr=bAct?1-t:t;
          const dx=x2-18-(x1+18),dy=y2-y1;
          C.beginPath();C.arc(x1+18+dx*pr,y1+dy*pr,3.5,0,Math.PI*2);
          C.fillStyle=bAct?'#f45d6d':'#5eaeff';C.fill();
        }
      }
    }
  }

  // Neurons
  const vals=[ INP, s>=1?e.a1:[NaN,NaN,NaN], s>=2?e.a2:[NaN,NaN], s>=3?[e.a3]:[NaN] ];
  const deltas=[ e.d1, e.d1, e.d2, [e.d3] ];
  for(let l=0;l<4;l++){
    for(let i=0;i<LY[l].n;i++){
      const nx=LY[l].x,ny=nY(l,i);
      const isAF=(isFwd&&((l===1&&s===1)||(l===2&&s===2)||(l===3&&s===3)));
      const isAB=(isBwd&&((l===3&&s===5)||(l===2&&s===6)||(l===1&&s===7)));
      if(isAF||isAB){
        const g=C.createRadialGradient(nx,ny,8,nx,ny,30);
        g.addColorStop(0,isAB?'rgba(244,93,109,0.3)':'rgba(94,174,255,0.3)');
        g.addColorStop(1,'rgba(0,0,0,0)');
        C.beginPath();C.arc(nx,ny,30,0,Math.PI*2);C.fillStyle=g;C.fill();
      }
      C.beginPath();C.arc(nx,ny,18,0,Math.PI*2);C.fillStyle='#1a1d2e';
      C.strokeStyle=isAF?'#5eaeff':isAB?'#f45d6d':'#3d4260';
      C.lineWidth=isAF||isAB?2.5:1.5;C.fill();C.stroke();

      C.font='10px Courier New';C.fillStyle='#e2e8f0';C.textAlign='center';C.textBaseline='middle';
      const v=vals[l]?vals[l][i]:NaN;
      if(!isNaN(v))C.fillText(v.toFixed(2),nx,ny);else{C.fillStyle='#555';C.fillText('?',nx,ny);}

      // Gradients
      if(isBwd&&l>0){
        const showG=(l===3&&s>=5)||(l===2&&s>=6)||(l===1&&s>=7);
        if(showG){
          const dv=l===3?e.d3:l===2?e.d2[i]:e.d1[i];
          C.font='8px Courier New';C.fillStyle='#f45d6d';
          C.fillText('d='+dv.toFixed(3),nx,ny+28);
        }
      }
    }
    C.fillStyle='#8892b0';C.font='10px Segoe UI';C.textAlign='center';C.textBaseline='top';
    C.fillText(LY[l].l,LY[l].x,nY(l,LY[l].n-1)+32);
  }

  // Phase
  C.font='bold 12px Segoe UI';C.textAlign='left';C.textBaseline='top';
  if(p==='init'){C.fillStyle='#f5b731';C.fillText('⚙ EPOCH '+(ep+1)+' — Weights & Biases',8,8);}
  else if(isFwd){C.fillStyle='#5eaeff';C.fillText('→ EPOCH '+(ep+1)+' — Forward Pass',8,8);}
  else if(isBwd){C.fillStyle='#f45d6d';C.fillText('← EPOCH '+(ep+1)+' — Backward Pass',8,8);}
  else{C.fillStyle='#22d3a7';C.fillText('✓ EPOCH '+(ep+1)+' — Updated!',8,8);}

  C.font='10px Segoe UI';C.textAlign='right';C.fillStyle='#8892b0';
  C.fillText('target='+YT+' | lr='+LR,W-8,8);
  if(s>=4)C.fillText('Loss='+e.loss.toFixed(4),W-8,22);

  // Loss chart
  const cx=780,cy=380,cw=160,ch=80;
  C.strokeStyle='#2d3148';C.lineWidth=1;C.strokeRect(cx,cy,cw,ch);
  C.font='9px Segoe UI';C.fillStyle='#8892b0';C.textAlign='center';C.textBaseline='top';
  C.fillText('Loss',cx+cw/2,cy-12);
  const ls=hist.map(h=>h.loss),ml=Math.max(...ls)*1.1;
  for(let i=0;i<=ep;i++){
    const bx=cx+20+i*(cw-40)/(EP-1||1),bh=(ls[i]/ml)*ch;
    C.fillStyle=i===ep?'#5eaeff':'#3d4260';C.fillRect(bx-10,cy+ch-bh,20,bh);
    C.font='8px Courier New';C.fillStyle='#e2e8f0';C.textAlign='center';
    C.fillText(ls[i].toFixed(3),bx,cy+ch-bh-9);
    C.fillStyle='#8892b0';C.font='8px Segoe UI';C.fillText('E'+(i+1),bx,cy+ch+4);
  }

  // Prediction tracker
  C.font='10px Segoe UI';C.fillStyle='#8892b0';C.textAlign='left';C.textBaseline='top';
  C.fillText('Predictions:',10,390);
  C.font='9px Courier New';
  for(let i=0;i<=ep;i++){
    const pred=hist[i].a3;
    C.fillStyle=Math.abs(pred-YT)<0.1?'#22d3a7':'#e2e8f0';
    C.fillText('E'+(i+1)+': '+pred.toFixed(4)+(i<ep?' →':''),10,405+i*14);
  }
  C.fillStyle='#f5b731';C.fillText('Target: '+YT,10,405+Math.min(ep+1,EP)*14);

  updP(ep,s,p,e);
}

function updP(ep,s,p,e){
  let h='';
  if(p==='init'){
    h='<h3 style="color:#f5b731">Epoch '+(ep+1)+' — Weights & Biases</h3>';
    h+='<p>Network: 2 inputs → 3 hidden (H1) → 2 hidden (H2) → 1 output. Total: 17 weights + 6 biases = 23 parameters.</p>';
    h+='<p style="color:#a78bfa">Purple "1" nodes = biases. They always output 1, multiplied by the bias weight: z = Σ(w×a) + b×1</p>';
    if(ep>0){
      h+='<p class="y">Weights changed from last epoch! Compare the numbers on connections to see learning.</p>';
      h+='<p>Previous prediction: '+hist[ep-1].a3.toFixed(4)+' → Current weights should do better.</p>';
    }
  } else if(p==='fwd'){
    h='<h3 style="color:#5eaeff">Epoch '+(ep+1)+' — Forward Pass</h3>';
    if(s===1)h+='<p>Hidden 1 (3 neurons): <span class="m">z = Σ(w×x) + b, a = sigmoid(z)</span></p><p class="m">a = ['+e.a1.map(v=>v.toFixed(3)).join(', ')+']</p>';
    else if(s===2)h+='<p>Hidden 2 (2 neurons): <span class="m">a = ['+e.a2.map(v=>v.toFixed(3)).join(', ')+']</span></p>';
    else if(s===3)h+='<p>Output: <span class="m">y_hat = sigmoid('+e.z3.toFixed(3)+') = '+e.a3.toFixed(4)+'</span></p>';
    else if(s===4){
      h+='<p>Loss: <span class="m">'+e.loss.toFixed(4)+'</span>';
      if(ep>0)h+=' (was '+hist[ep-1].loss.toFixed(4)+' — <span class="'+(e.loss<hist[ep-1].loss?'m':'w')+'">'+(e.loss<hist[ep-1].loss?'decreased!':'hmm')+'</span>)';
      h+='</p><p>Prediction: '+e.a3.toFixed(4)+' vs target: '+YT+' — error: '+(YT-e.a3).toFixed(4)+'</p>';
    }
  } else if(p==='bwd'){
    h='<h3 style="color:#f45d6d">Epoch '+(ep+1)+' — Backward Pass</h3>';
    if(s===5)h+='<p>Output gradient: <span class="m">d = '+e.d3.toFixed(4)+'</span></p><p>This tells us: how much should the output neuron\'s input change to reduce loss?</p>';
    else if(s===6)h+='<p>Hidden 2 gradients: <span class="m">['+e.d2.map(v=>v.toFixed(4)).join(', ')+']</span></p><p>Each H2 neuron gets gradient proportional to its weight to the output × sigmoid derivative.</p>';
    else if(s===7)h+='<p>Hidden 1 gradients: <span class="m">['+e.d1.map(v=>v.toFixed(5)).join(', ')+']</span></p><p>Notice these are smaller — gradient shrinks through each sigmoid layer (vanishing gradient).</p>';
    else if(s===8)h+='<p>Updating all 23 parameters: <span class="m">w = w - '+LR+' × dL/dw</span></p><p>Bias update: <span class="m">b = b - '+LR+' × delta</span> (since bias input is always 1)</p>';
  } else {
    h='<h3 style="color:#22d3a7">Epoch '+(ep+1)+' Complete!</h3>';
    h+='<p>Loss: <span class="m">'+e.loss.toFixed(4)+'</span> | Prediction: <span class="m">'+e.a3.toFixed(4)+'</span> (target: '+YT+')</p>';
    if(ep<EP-1)h+='<p class="y">Next epoch uses updated weights. Watch the prediction get closer!</p>';
    else h+='<p class="y">Training done! Loss: '+hist[0].loss.toFixed(4)+' → '+hist[EP-1].loss.toFixed(4)+'. Prediction: '+hist[0].a3.toFixed(4)+' → '+hist[EP-1].a3.toFixed(4)+'</p>';
  }
  pn.innerHTML=h;
  sc.textContent='Epoch '+(ep+1)+'/'+EP+' Step '+(s+1)+'/'+SPE;
}

function stp(){if(cur<TOT-1)cur++;draw();}
function togPlay(){playing=!playing;document.getElementById('bp').textContent=playing?'⏸ Pause':'▶ Play';
  document.getElementById('bp').classList.toggle('on',playing);
  if(playing)tmr=setInterval(()=>{if(cur>=TOT-1){togPlay();return;}stp();},spd);else clearInterval(tmr);}
function rst(){if(playing)togPlay();cur=0;build();draw();}
function anim(){draw();requestAnimationFrame(anim);}
draw();anim();
</script>
</body>
</html>
